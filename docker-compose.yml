services:
 
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./src/CommunicationControl
      dockerfile: Dockerfile
    ports:
      - "5000:8080" 
    environment:
      - Redis__ConnectionString=redis:6379,abortConnect=False
    depends_on:
      - redis

  frontend:
    build:
      context: ./src/MapClient
      dockerfile: Dockerfile
    ports:
      - "3000:80" 
    depends_on:
      - backend